site_name: FiveM Loading Screen
site_url: https://fivem-loading.vercel.app/
theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - codehilite
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Home: index.md
  - Config Builder: https://fivem-loading.vercel.app/builder.html
  - Build with AI: https://fivem-loading.vercel.app/ai.html
  - Getting Started: setup.md
  - Customization:
    - 🎨 Overview: overview.md
    - 🌐 Language & RTL: localization.md
    - 🎥 Background: background.md
    - 🏷️ Watermark: watermark.md
    - ✨ Title Animation: title-animation.md
    - 🧷 Social Headers: socials.md
    - 📜 Rules Panel: rules.md
    - 👥 Team Panel: team.md
    - 🖼️ Gallery Grid: gallery.md
    - 🧩 Custom Panel: custom-panel.md
    - ⌨️ Keyboard Overlay: keyboard-overlay.md
    - 🎵 Music Player: music-player.md
  # - FAQ: faq.md
  - Upgrading: upgrade.md
  - Changelog: changelog.md
  - Community: https://thevibe.mooo.com/
  - Terms: https://fivem-loading.vercel.app/terms.html
extra_css:
  - stylesheets/custom-admonitions.css
